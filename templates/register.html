<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>USD Men's Rowing — Register</title>
  <link rel="icon" href="{{ url_for('static', filename='nav_logo.svg') }}" type="image/svg+xml">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <a class="site-logo" href="{{ url_for('login') }}" aria-label="USD Men's Rowing">
    <img src="{{ url_for('static', filename='nav_logo.svg') }}" alt="" width="160" height="48">
  </a>
  <div class="wrapper">
    <form method="post" action="{{ url_for('register') }}">
      <h2>University of San Diego</h2>
      <p class="tagline">Men's Rowing — create your account</p>
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <div class="flash-list">
            {% for category, message in messages %}
              <p class="flash flash-{{ category }}">{{ message }}</p>
            {% endfor %}
          </div>
        {% endif %}
      {% endwith %}
      <div class="input-field">
        <input type="email" name="username" id="username" autocomplete="username" required>
        <label for="username">USD email (@sandiego.edu)</label>
      </div>
      <div class="input-field">
        <input type="password" name="password" id="password" autocomplete="new-password" required minlength="{{ min_password_length }}">
        <label for="password">Password (min. {{ min_password_length }} characters)</label>
      </div>
      <div class="input-field">
        <input type="password" name="password_confirm" id="password_confirm" autocomplete="new-password" required minlength="{{ min_password_length }}">
        <label for="password_confirm">Confirm password</label>
      </div>
      <button type="submit">Create account</button>
      <div class="register">
        <p>Already have an account? <a href="{{ url_for('login') }}">Sign in</a></p>
      </div>
    </form>
  </div>
</body>
</html>
